spring.application.name=gav
#ENTORNO DE DESARROLLO PARA PRUEBAS Y DEMAS
#CONEXION A DB MYSQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/gav
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.flyway.baseline-on-migrate=true

#CONEXION CON POSTGRE DESDE LA NUBE
#spring.datasource.url=
#spring.datasource.username=
#spring.datasource.password=
#spring.datasource.driver-class-name=org.postgresql.Driver


#LOG DE CONEXION PARA PRUEBAS
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

# NUEVO: Configuracion JWT
# Secret en Base64 de minimo 256 bits para firma HMAC-SHA256.
# IMPORTANTE: cambiar este valor por uno seguro antes de desplegar a produccion.
jwt.secret=dGhpc0lzQVNlY3JldEtleUZvckpXVFNpZ25pbmdQdXJwb3Nlc09ubHkxMjM0NTY=
# Tiempo de expiracion del token en milisegundos (86400000 = 24 horas)
jwt.expiration=86400000

# NUEVO: Configuracion del chatbot de sugerencia de lugares (solo clientes).
# Proveedor por defecto: Google Gemini (Google AI Studio).
# La API key se lee de la variable de entorno CHATBOT_API_KEY (NUNCA hardcodear).
chatbot.provider=gemini
chatbot.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
chatbot.api-key=${CHATBOT_API_KEY:}
chatbot.timeout-ms=15000
chatbot.max-lugares-grounding=25
chatbot.top-solicitados=10
