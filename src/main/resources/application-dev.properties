spring.application.name=gav

# =========================================
# ENTORNO DE DESARROLLO
# =========================================

# MYSQL DATABASE
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/gav1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / HIBERNATE
# =========================================

# PERSISTENCIA: 'update' añade columnas/tablas faltantes pero NO borra datos.
# NUNCA usar 'create', 'create-drop' ni 'drop-and-create' (recrean el esquema
# desde cero en cada arranque y eliminan toda la información).
# Para producción: 'validate' (solo verifica que el esquema coincide con las
# entidades; no toca nada).
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================================
# FLYWAY
# =========================================
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true

# =========================================
# LOGGING
# =========================================
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# =========================================
# JWT
# =========================================
jwt.secret=dGhpc0lzQVNlY3JldEtleUZvckpXVFNpZ25pbmdQdXJwb3Nlc09ubHkxMjM0NTY=
jwt.expiration=86400000

# =========================================
# CHATBOT
# =========================================
chatbot.provider=gemini
chatbot.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
chatbot.api-key=${CHATBOT_API_KEY:}
chatbot.timeout-ms=15000
chatbot.max-lugares-grounding=25
chatbot.top-solicitados=10
