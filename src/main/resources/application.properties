# ===============================
# PERFIL POR DEFECTO
# ===============================
# Garantiza que el perfil 'dev' se active siempre, sin importar cómo se
# arranque el backend (IDE, mvn spring-boot:run, java -jar). Antes, si el
# perfil no se activaba a mano, Spring usaba SOLO application.properties
# y se conectaba a una BD distinta (gav vs gav1), dando la falsa impresión
# de que la BD se "reseteaba" entre arranques.
spring.profiles.active=dev

# ===============================
# MYSQL DATABASE  (BD CANÓNICA = gav1)
# ===============================
# Misma URL/BD que application-dev.properties para evitar divergencia entre
# perfiles. Si en el futuro se agrega un perfil 'prod', su URL irá allí.
spring.datasource.url=jdbc:mysql://localhost:3306/gav1?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# PERSISTENCIA: 'update' añade columnas/tablas faltantes pero NO borra datos.
# NUNCA usar 'create' ni 'create-drop' (recrean el esquema desde cero
# en cada arranque y eliminan toda la información).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT
# ===============================
# Secreto en Base64 válido (≥256 bits para HS256)
jwt.secret=Z2F2U2VjcmV0S2V5UGFyYUpXVDIwMjVHZXN0aW9uQXNpZ25hY2lvbkRlVmlhamVzQ2FydGFnZW5h
jwt.expiration=86400000

# ===============================
# CHATBOT (Gemini) — URL pública; la API key va en secrets.properties (gitignored)
# ===============================
# gemini-1.5-flash fue retirado por Google (404). gemini-2.5-flash es el modelo
# estable vigente que soporta generateContent en la API v1beta.
chatbot.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
chatbot.timeout-ms=15000
chatbot.max-lugares-grounding=25
chatbot.top-solicitados=10

# ===============================
# SECRETS (chatbot key, etc.) — archivos gitignoreados
# ===============================
spring.config.import=optional:classpath:secrets.properties,optional:file:./secrets.properties

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG

# ===============================
# SERVER
# ===============================
server.port=8080
