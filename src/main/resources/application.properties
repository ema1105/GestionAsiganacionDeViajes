spring.application.name=gav

# Importa secretos locales (CHATBOT_API_KEY, etc). Se intenta primero por
# classpath (robusto sin importar el directorio de ejecución) y luego por
# archivo en la raíz. 'optional:' evita fallo si no existe. Está en .gitignore.
spring.config.import=optional:classpath:secrets.properties,optional:file:./secrets.properties

#ENTORNO DE PRODUCCION FINAL
#ACTIVACION DEL PERFIL O ENTORNO DEV
spring.profiles.active=dev

#CONEXION A DB MYSQL
spring.datasource.url.url=
spring.datasource.username=
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=
spring.jpa.show-sql=


#CONEXION CON POSTGRE DESDE LA NUBE
#spring.datasource.url=
#spring.datasource.username=
#spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver


#LOG DE CONEXION PARA PRUEBAS
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG